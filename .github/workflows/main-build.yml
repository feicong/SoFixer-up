name: build all platforms

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

permissions:
  contents: write

jobs:
  build_native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Configure CMake
      run: cmake -S ${{ github.workspace }} -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DSO_64=ON

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

    - name: Test
      working-directory: ${{ github.workspace }}/build
      run: ctest --build-config ${{ env.BUILD_TYPE }} --output-on-failure

    - name: Prepare native binary
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path "$env:GITHUB_WORKSPACE/dist" -Force | Out-Null
        if ("${{ matrix.os }}" -eq "windows-latest") {
          $src = "$env:GITHUB_WORKSPACE/build/Release/SoFixer64.exe"
          if (!(Test-Path $src)) {
            $src = "$env:GITHUB_WORKSPACE/build/SoFixer64.exe"
          }
          if (!(Test-Path $src)) {
            throw "windows binary not found"
          }
          Copy-Item $src "$env:GITHUB_WORKSPACE/dist/SoFixer-windows-latest.exe"
        } elseif ("${{ matrix.os }}" -eq "macos-latest") {
          $src = "$env:GITHUB_WORKSPACE/build/SoFixer64"
          if (!(Test-Path $src)) {
            throw "macos binary not found"
          }
          Copy-Item $src "$env:GITHUB_WORKSPACE/dist/SoFixer-macos-latest"
        } else {
          $src = "$env:GITHUB_WORKSPACE/build/SoFixer64"
          if (!(Test-Path $src)) {
            throw "ubuntu binary not found"
          }
          Copy-Item $src "$env:GITHUB_WORKSPACE/dist/SoFixer-ubuntu-latest"
        }

    - name: Upload native artifact
      uses: actions/upload-artifact@v6
      with:
        name: SoFixer-${{ matrix.os }}
        path: ${{ github.workspace }}/dist/SoFixer-*
        if-no-files-found: error

  build_android_arm64:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r27c

    - name: Configure CMake(Android arm64-v8a)
      run: >
        cmake -S ${{ github.workspace }}
        -B ${{ github.workspace }}/build-android-arm64
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -DSO_64=ON
        -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake
        -DANDROID_ABI=arm64-v8a
        -DANDROID_PLATFORM=android-21

    - name: Build(Android arm64-v8a)
      run: cmake --build ${{ github.workspace }}/build-android-arm64 --config ${{ env.BUILD_TYPE }}

    - name: Prepare Android binary
      run: |
        mkdir -p ${{ github.workspace }}/dist
        cp ${{ github.workspace }}/build-android-arm64/SoFixer64 ${{ github.workspace }}/dist/SoFixer-android-arm64

    - name: Upload Android artifact
      uses: actions/upload-artifact@v6
      with:
        name: SoFixer-Android-arm64
        path: ${{ github.workspace }}/dist/SoFixer-android-arm64
        if-no-files-found: error

  publish_latest:
    if: github.event_name != 'pull_request'
    needs: [build_native, build_android_arm64]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Download all build artifacts
      uses: actions/download-artifact@v6
      with:
        path: release-assets

    - name: Collect release files
      run: |
        mkdir -p release-files
        find release-assets -type f -exec cp {} release-files/ \;
        ls -la release-files

    - name: Create or update latest release and overwrite assets
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh release view latest >/dev/null 2>&1; then
          echo "release latest exists, upload with overwrite"
        else
          gh release create latest --title "latest" --notes "latest build artifacts"
        fi

        assets=$(gh release view latest --json assets --jq '.assets[].name')
        if [ -n "$assets" ]; then
          while IFS= read -r asset; do
            if [ -n "$asset" ]; then
              gh release delete-asset latest "$asset" -y
            fi
          done <<< "$assets"
        fi

        gh release upload latest release-files/* --clobber
